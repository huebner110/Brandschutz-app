function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function clone(x) { return JSON.parse(JSON.stringify(x)); }
function fmtDate(s) {
  if (!s) return '';
  var parts = s.split('-');
  return parts[2] + '.' + parts[1] + '.' + parts[0];
}
function today() { return new Date().toISOString().split('T')[0]; }

function daysBetween(d1, d2) {
  var t1 = new Date(d1).getTime();
  var t2 = new Date(d2).getTime();
  return Math.round((t2 - t1) / 86400000);
}

function inspCounts(insp) {
  var checks = insp.checks || {};
  var totalItems = S.categories.reduce(function(n, c) { return n + c.items.length; }, 0);
  var vals = Object.values(checks);
  return {
    total: vals.length, totalItems: totalItems,
    ok: vals.filter(function(v) { return v.status === 'ok'; }).length,
    mangel: (insp.maengel || []).length,
    na: vals.filter(function(v) { return v.status === 'na'; }).length,
    kritisch: (insp.maengel || []).filter(function(m) { return m.dringlichkeit === 'kritisch'; }).length,
    offen: (insp.maengel || []).filter(function(m) { return !m.behoben; }).length
  };
}

function lastInspForStandort(standort) {
  var found = null;
  for (var i = S.inspections.length - 1; i >= 0; i--) {
    if (S.inspections[i].standort === standort) { found = S.inspections[i]; break; }
  }
  return found;
}

/* ── HINWEIS-BANNER BERECHNEN ── */
function calcHinweise() {
  var items = [];
  for (var li = 0; li < LOCATIONS.length; li++) {
    var loc = LOCATIONS[li];
    // Begehungsintervall prüfen
    var interval = S.intervalle[loc] ? parseInt(S.intervalle[loc]) : 0;
    if (interval > 0) {
      var lastInsp = lastInspForStandort(loc);
      var daysSinceInsp = lastInsp ? daysBetween(lastInsp.datum, today()) : 9999;
      var daysLeftInsp = interval - daysSinceInsp;
      if (daysLeftInsp <= 14) {
        items.push({
          type: 'begehung', loc: loc,
          overdue: daysLeftInsp < 0,
          days: Math.abs(daysLeftInsp),
          action: 'hint-begehung'
        });
      }
    }
    // Unterweisungsintervall prüfen (immer jährlich)
    var lastUW = lastUWForStandort(loc);
    var daysLeftUW = uwDaysLeft(lastUW);
    if (daysLeftUW <= 30) {
      items.push({
        type: 'unterweisung', loc: loc,
        overdue: daysLeftUW < 0,
        days: Math.abs(daysLeftUW),
        action: 'hint-uw'
      });
    }
    // Anlagen: Prüffristen
    for (var ai = 0; ai < S.anlagen.length; ai++) {
      var anlage = S.anlagen[ai];
      if (anlage.standort === loc && anlage.letztePruefung && anlage.intervallMonate) {
        var naechste = addMonths(anlage.letztePruefung, anlage.intervallMonate);
        var adl = daysLeft(naechste);
        if (adl <= 30) {
          items.push({ type: 'anlage', loc: loc, bezeichnung: anlage.bezeichnung, overdue: adl < 0, days: Math.abs(adl), action: 'hint-technik' });
        }
      }
    }
    // Wartungsverträge: Termine
    for (var vci = 0; vci < S.vertraege.length; vci++) {
      var vertrag = S.vertraege[vci];
      if (vertrag.standort === loc && vertrag.naechsterTermin) {
        var vdl = daysLeft(vertrag.naechsterTermin);
        if (vdl <= 30) {
          items.push({ type: 'vertrag', loc: loc, bezeichnung: vertrag.leistung || vertrag.firma, overdue: vdl < 0, days: Math.abs(vdl), action: 'hint-technik' });
        }
      }
    }
  }
  // Aufgaben: fällige / überfällige (nicht erledigt)
  for (var qi = 0; qi < S.aufgaben.length; qi++) {
    var aufg = S.aufgaben[qi];
    if (aufg.status === 'Erledigt' || !aufg.frist) continue;
    var qdl = daysLeft(aufg.frist);
    if (qdl <= 7) {
      items.push({ type: 'aufgabe', loc: '', bezeichnung: aufg.aufgabe, overdue: qdl < 0, days: Math.abs(qdl), action: 'hint-aufgaben' });
    }
  }
  return items;
}

/* ── DASHBOARD ── */
function vDashboard() {
  var cardsHtml = '';
  for (var li = 0; li < LOCATIONS.length; li++) {
    var loc = LOCATIONS[li];
    var last = lastInspForStandort(loc);
    var openCount = 0;
    var kritischCount = 0;
    var isOverdue = false;
    var interval = S.intervalle[loc] ? parseInt(S.intervalle[loc]) : 0;

    if (last) {
      var maengel = last.maengel || [];
      for (var mi = 0; mi < maengel.length; mi++) {
        if (!maengel[mi].behoben) {
          openCount++;
          if (maengel[mi].dringlichkeit === 'kritisch') kritischCount++;
        }
      }
      if (interval > 0) {
        var daysSince = daysBetween(last.datum, today());
        isOverdue = daysSince > interval;
      }
    } else {
      if (interval > 0) isOverdue = true;
    }

    var badges = '';
    if (kritischCount > 0) badges += '<span class="badge badge-crit">' + kritischCount + ' kritisch</span>';
    else if (openCount > 0) badges += '<span class="badge badge-warn">' + openCount + ' offen</span>';
    else if (last) badges += '<span class="badge badge-ok">OK</span>';
    if (isOverdue) badges += '<span class="badge badge-overdue">überfällig</span>';

    cardsHtml += '<div class="dash-card' + (isOverdue ? ' dash-card-overdue' : '') + '" data-action="dash-start" data-loc="' + loc + '">' +
      '<div class="dash-name">' + loc + '</div>' +
      '<div class="dash-date">' + (last ? fmtDate(last.datum) : 'Keine Begehung') + '</div>' +
      '<div class="dash-badges">' + badges + '</div>' +
      '</div>';
  }

  return '<div class="header header-dark">' +
    '<button class="icon-btn" data-action="go-home" aria-label="Zurück"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>' +
    '<div class="header-center"><div class="header-title-sm">Standort-Übersicht</div></div>' +
    '<button class="icon-btn" data-action="go-matrix" aria-label="Compliance-Matrix" title="Compliance-Matrix">' +
    '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="1"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg></button>' +
    '<button class="icon-btn" data-action="go-qr" aria-label="QR-Codes">' +
    '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="5" height="5"/><rect x="16" y="3" width="5" height="5"/><rect x="3" y="16" width="5" height="5"/><path d="M21 16h-3v3"/><path d="M18 21h3"/><path d="M21 21v-3"/><path d="M13 3v5h5"/><path d="M13 13h5v5"/></svg></button>' +
    '</div>' +
    '<div class="content">' +
    '<div class="section-header">Tippen zum Starten einer Begehung</div>' +
    '<div class="dash-grid">' + cardsHtml + '</div>' +
    '</div>';
}

/* ── OFFENE MÄNGEL GLOBAL ── */
function vMaengelGlobal() {
  var items = [];
  for (var ii = 0; ii < S.inspections.length; ii++) {
    var insp = S.inspections[ii];
    var maengel = insp.maengel || [];
    for (var mi = 0; mi < maengel.length; mi++) {
      if (!maengel[mi].behoben) {
        items.push({ insp: insp, mangel: maengel[mi] });
      }
    }
  }
  items.sort(function(a, b) {
    var order = ['kritisch','mittel','gering'];
    return order.indexOf(a.mangel.dringlichkeit) - order.indexOf(b.mangel.dringlichkeit);
  });

  var html = '';
  if (items.length === 0) {
    html = '<div class="card empty-state">Keine offenen Mängel.</div>';
  } else {
    for (var k = 0; k < items.length; k++) {
      var it = items[k];
      var m = it.mangel;
      var inspRef = it.insp;
      html += '<div class="mangel-card mangel-card-' + m.dringlichkeit + '">' +
        '<div class="mangel-card-header">' +
        '<span class="mangel-card-cat">' + inspRef.standort + ' &middot; ' + fmtDate(inspRef.datum) + '</span>' +
        '<span class="dring-badge dring-' + m.dringlichkeit + '">' + m.dringlichkeit + '</span>' +
        '</div>' +
        '<div class="mangel-card-item">' + m.checkName + '</div>' +
        '<div class="mangel-card-desc">' + (m.beschreibung || '') + '</div>' +
        (m.frist ? '<div class="mangel-card-frist">Frist: ' + fmtDate(m.frist) + '</div>' : '') +
        (m.zustaendig ? '<div class="mangel-card-frist">Zuständig: ' + m.zustaendig + '</div>' : '') +
        '<div class="mangel-card-actions">' +
        '<button class="btn-sm-ok" data-action="mark-behoben" data-inspid="' + inspRef.id + '" data-mid="' + m.id + '">Als behoben markieren</button>' +
        '</div></div>';
    }
  }

  return '<div class="header header-dark">' +
    '<button class="icon-btn" data-action="go-home" aria-label="Zurück"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>' +
    '<div class="header-center"><div class="header-title-sm">Offene Mängel</div>' +
    '<div class="header-sub">' + items.length + ' gesamt</div></div>' +
    '</div>' +
    '<div class="content">' + html + '</div>';
}

/* ── QR-CODES ── */
function vQrCodes() {
  var cardsHtml = '';
  for (var li = 0; li < LOCATIONS.length; li++) {
    var loc = LOCATIONS[li];
    var url = NETLIFY_URL + '?loc=' + encodeURIComponent(loc);
    var qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=' + encodeURIComponent(url);

    '<div class="header-center"><div class="header-title-sm">QR-Codes je Standort</div></div>' +

/* ── INSPECTION ── */
function vInspection() {
  var insp = S.currentInspection;
  var checks = insp.checks || {};
  var totalItems = S.categories.reduce(function(n, c) { return n + c.items.length; }, 0);
  var checked = Object.keys(checks).length;
  var pct = totalItems > 0 ? Math.round(checked / totalItems * 100) : 0;
  var allDone = checked === totalItems;

  var catsHtml = '';
  for (var ci = 0; ci < S.categories.length; ci++) {
    var cat = S.categories[ci];
    var catChecked = cat.items.filter(function(i) { return checks[i.id]; }).length;
    var collapsed = S.collapsedCats[cat.id];
    var itemsHtml = '';
    if (!collapsed) {
      for (var ii = 0; ii < cat.items.length; ii++) {
        var item = cat.items[ii];
        var check = checks[item.id] || {};
        var status = check.status || null;
        var mangel = null;
        var maengel = insp.maengel || [];
        for (var mi = 0; mi < maengel.length; mi++) {
          if (maengel[mi].checkId === item.id) { mangel = maengel[mi]; break; }
        }
        var mangelPreview = '';
        if (mangel) {
          mangelPreview = '<div class="mangel-preview" data-action="edit-defect" data-mid="' + mangel.id + '" data-cid="' + item.id + '">' +
            '<span class="mangel-preview-text">' + (mangel.beschreibung || 'Mangel – tippen zum Bearbeiten') + '</span>' +
            '<span class="dring-badge dring-' + mangel.dringlichkeit + '">' + mangel.dringlichkeit + '</span></div>';
        }
        var safeName = item.name.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        var extraHtml = '';
        if (status === 'ok' || status === 'na') {
          var notizActive = check.notiz ? ' check-extra-btn-active' : '';
          var notizLabel = check.notiz ? '&#9998; Notiz' : '+ Notiz';
          var photoCount = (check.fotos && check.fotos.length) ? check.fotos.length : 0;
          var photoLabel = photoCount > 0 ? ('&#128247; ' + photoCount) : '&#128247; Foto';
          extraHtml += '<div class="check-extra">' +
            '<button class="check-extra-btn' + notizActive + '" data-action="check-notiz" data-iid="' + item.id + '">' + notizLabel + '</button>' +
            '<button class="check-extra-btn" data-action="check-photo" data-iid="' + item.id + '">' + photoLabel + '</button>' +
            '</div>';
          if (check.notiz) {
            extraHtml += '<div class="check-notiz">' + check.notiz + '</div>';
          }
          if (check.fotos && check.fotos.length) {
            extraHtml += '<div class="check-photos-row">';
            for (var fp2 = 0; fp2 < check.fotos.length; fp2++) {
              extraHtml += '<img class="check-photo-thumb" src="' + check.fotos[fp2] + '" alt="Foto">';
            }
            extraHtml += '</div>';
          }
        }
        itemsHtml += '<div class="check-item' + (status ? ' check-item-' + status : '') + '">' +
          '<div class="check-item-name">' + item.name + '</div>' +
          mangelPreview + extraHtml +
          '<div class="check-buttons">' +
          '<button class="check-btn check-btn-ok' + (status === 'ok' ? ' active' : '') + '" data-action="check-ok" data-iid="' + item.id + '">OK</button>' +
          '<button class="check-btn check-btn-mangel' + (status === 'mangel' ? ' active' : '') + '" data-action="check-mangel" data-iid="' + item.id + '" data-iname="' + safeName + '">Mangel</button>' +
          '<button class="check-btn check-btn-na' + (status === 'na' ? ' active' : '') + '" data-action="check-na" data-iid="' + item.id + '">N.A.</button>' +
          '</div></div>';
      }
    }
    catsHtml += '<div class="category-section">' +
      '<div class="category-header" data-action="toggle-cat" data-cat="' + cat.id + '">' +
      '<span class="category-name">' + cat.name + '</span>' +
      '<span class="category-progress">' + catChecked + '/' + cat.items.length + '</span>' +
      '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="chevron' + (collapsed ? ' chevron-closed' : '') + '"><polyline points="6 9 12 15 18 9"/></svg>' +
      '</div>' +
      (!collapsed ? '<div class="category-items">' + itemsHtml + '</div>' : '') +
      '</div>';
  }

  var finishBtn = allDone
    ? '<button class="btn-primary" data-action="finish-insp">Begehung abschließen</button>'
    : '<button class="btn-outline" data-action="finish-insp">Jetzt abschließen (' + checked + '/' + totalItems + ')</button>';

  return '<div class="header header-dark">' +
    '<button class="icon-btn" data-action="back-home" aria-label="Zurück"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>' +
    '<div class="header-center">' +
    '<div class="header-title-sm">' + insp.standort + '</div>' +
    '<div class="header-sub">' + fmtDate(insp.datum) + '</div></div>' +
    '<div class="header-badge">' + checked + '/' + totalItems + '</div></div>' +
    '<div class="progress-container">' +
    '<div class="progress-bar-outer"><div class="progress-bar-inner" style="width:' + pct + '%"></div></div>' +
    '<div class="progress-label">' + pct + '% abgeschlossen</div></div>' +
    '<div class="content" style="padding-bottom:calc(80px + var(--safe-bottom))">' +
    catsHtml + '</div>' +
    '<div class="bottom-bar">' + finishBtn + '</div>';
}

/* ── DEFECT ── */
function vDefect() {
  var insp = S.currentInspection;
  var m = null;
  var maengel = insp.maengel || [];
  for (var i = 0; i < maengel.length; i++) {
    if (maengel[i].id === S.currentDefectId) { m = maengel[i]; break; }
  }
  if (!m) m = { id: S.currentDefectId, checkId: S.currentDefectCheckId, checkName: S.currentDefectCheckName, beschreibung: '', dringlichkeit: 'mittel', zustaendig: '', frist: '', fotos: [] };

  var fotosHtml = '';
  var fotos = m.fotos || [];
  for (var f = 0; f < fotos.length; f++) {
    fotosHtml += '<div class="photo-thumb-wrapper">' +
      '<img class="photo-thumb" src="' + fotos[f] + '" alt="Foto ' + (f+1) + '">' +
      '<button class="photo-delete" data-action="del-photo" data-idx="' + f + '">&times;</button>' +
      '</div>';
  }
  fotosHtml += '<button class="photo-add-btn" data-action="add-photo-defect">' +
    '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></button>';

  return '<div class="header header-dark">' +
    '<button class="icon-btn" data-action="cancel-defect">' +
    '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>' +
    '<div class="header-center">' +
    '<div class="header-title-sm">Mangel erfassen</div>' +
    '<div class="header-sub" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + (m.checkName || '') + '</div></div>' +
    '<button class="text-btn" data-action="save-defect">Speichern</button></div>' +
    '<div class="content">' +
    '<div class="card">' +
    '<div class="form-group"><label class="form-label">Beschreibung *</label>' +
    '<textarea class="form-textarea" id="d-beschr" placeholder="Was genau ist der Mangel?">' + (m.beschreibung || '') + '</textarea></div>' +
    '<div class="form-group"><label class="form-label">Dringlichkeit</label>' +
    '<div class="seg-control">' +
    '<button class="seg-btn' + (m.dringlichkeit === 'gering' ? ' seg-active-ok' : '') + '" data-action="set-dring" data-val="gering">Gering</button>' +
    '<button class="seg-btn' + (m.dringlichkeit === 'mittel' ? ' seg-active-warn' : '') + '" data-action="set-dring" data-val="mittel">Mittel</button>' +
    '<button class="seg-btn' + (m.dringlichkeit === 'kritisch' ? ' seg-active-crit' : '') + '" data-action="set-dring" data-val="kritisch">Kritisch</button>' +
    '</div></div>' +
    '<div class="form-group"><label class="form-label">Zuständig (optional)</label>' +
    '<input type="text" class="form-input" id="d-zust" value="' + (m.zustaendig || '') + '" placeholder="Name oder Firma"></div>' +
    '<div class="form-group"><label class="form-label">Frist zur Behebung (optional)</label>' +
    '<input type="date" class="form-input" id="d-frist" value="' + (m.frist || '') + '"></div>' +
    '<div class="form-group">' +
    '<label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px 0;border-top:0.5px solid var(--border)">' +
    '<input type="checkbox" id="d-bedenken"' + (m.bedenken ? ' checked' : '') + ' style="width:20px;height:20px;accent-color:var(--crit);flex-shrink:0;">' +
    '<span>' +
    '<span style="display:block;font-size:14px;font-weight:600;color:var(--crit)">Sicherheitstechnische Bedenkenanzeige</span>' +
    '<span style="display:block;font-size:11px;color:var(--text-light);margin-top:2px">Erzeugt ein separates Anzeige-Dokument für die Geschäftsführung im PDF-Export</span>' +

/* ── SUMMARY ── */
function vSummary() {
  var insp = S.currentInspection;
  var c = inspCounts(insp);
  var maengel = (insp.maengel || []).slice().sort(function(a, b) {
    var order = ['kritisch','mittel','gering'];
    return order.indexOf(a.dringlichkeit) - order.indexOf(b.dringlichkeit);
  });

  var maengelHtml = '';
  if (maengel.length > 0) {
    maengelHtml = '<div class="section-header">Festgestellte Mängel</div>';
    for (var mi = 0; mi < maengel.length; mi++) {
      var m = maengel[mi];
      var cat = null;
      for (var ci = 0; ci < S.categories.length; ci++) {
        for (var ii = 0; ii < S.categories[ci].items.length; ii++) {
          if (S.categories[ci].items[ii].id === m.checkId) { cat = S.categories[ci]; break; }
        }
        if (cat) break;
      }
      var fotosPreview = '';
      if (m.fotos && m.fotos.length) {

function initSignatureCanvas() {
  var canvas = document.getElementById('sig-canvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var rect = canvas.getBoundingClientRect();
  var scaleX = canvas.width / rect.width;
  var scaleY = canvas.height / rect.height;
  var drawing = false;
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  function getPos(e) {
    var src = e.touches ? e.touches[0] : e;
    var r2 = canvas.getBoundingClientRect();
    return { x: (src.clientX - r2.left) * scaleX, y: (src.clientY - r2.top) * scaleY };
  }

  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    drawing = true;
    var p = getPos(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
  }, { passive: false });

  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    if (!drawing) return;
    var p = getPos(e);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
  }, { passive: false });

  canvas.addEventListener('touchend', function(e) {
    e.preventDefault();
    drawing = false;
  }, { passive: false });

  canvas.addEventListener('mousedown', function(e) {
    drawing = true;
    var p = getPos(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
  });
  canvas.addEventListener('mousemove', function(e) {
    if (!drawing) return;
    var p = getPos(e);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
  });
  canvas.addEventListener('mouseup', function() { drawing = false; });

  document.getElementById('sig-clear').addEventListener('click', function() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  });
}

    '<div style="padding-bottom:calc(24px + var(--safe-bottom))"></div>' +

/* ── TERMINKALENDER ── */

function collectAllTermine() {
  var termine = [];

  // Begehungsintervalle
  for (var li = 0; li < LOCATIONS.length; li++) {
    var loc = LOCATIONS[li];
    var intv = S.intervalle[loc] ? parseInt(S.intervalle[loc]) : 0;
    if (intv > 0) {
      var lastInsp = lastInspForStandort(loc);
      var faelligDatum;
      if (lastInsp) {
        var d = new Date(lastInsp.datum);
        d.setDate(d.getDate() + intv);
        faelligDatum = d.toISOString().split('T')[0];
      } else {
        faelligDatum = today();
      }
      termine.push({ datum: faelligDatum, typ: 'Begehung', beschreibung: 'Brandschutzbegehung', standort: loc, dl: daysLeft(faelligDatum) });
    }
  }

  // Unterweisungen
  for (var li2 = 0; li2 < LOCATIONS.length; li2++) {
    var loc2 = LOCATIONS[li2];
    var lastUW = lastUWForStandort(loc2);
    var uwDl = uwDaysLeft(lastUW);
    var uwBase = lastUW ? lastUW.datum : today();
    var uwD = new Date(uwBase);
    uwD.setFullYear(uwD.getFullYear() + (lastUW ? 1 : 0));
    var uwFaellig = uwD.toISOString().split('T')[0];
    termine.push({ datum: uwFaellig, typ: 'Unterweisung', beschreibung: 'Brandschutzunterweisung (DGUV V2)', standort: loc2, dl: uwDl });
  }

  // Anlagen
  for (var ai = 0; ai < S.anlagen.length; ai++) {
    var anlage = S.anlagen[ai];
    if (anlage.letztePruefung && anlage.intervallMonate) {
      var naechste = addMonths(anlage.letztePruefung, anlage.intervallMonate);
      termine.push({ datum: naechste, typ: 'Anlage', beschreibung: anlage.bezeichnung + ' (' + anlage.typ + ')', standort: anlage.standort, dl: daysLeft(naechste) });
    }
  }

  // Wartungsverträge
  for (var vi = 0; vi < S.vertraege.length; vi++) {
    var v = S.vertraege[vi];
    if (v.naechsterTermin) {
      termine.push({ datum: v.naechsterTermin, typ: 'Wartung', beschreibung: v.firma + (v.leistung ? ' – ' + v.leistung : ''), standort: v.standort, dl: daysLeft(v.naechsterTermin) });
    }
  }

  // Aufgaben
  for (var qi = 0; qi < S.aufgaben.length; qi++) {
    var aufg = S.aufgaben[qi];
    if (aufg.frist && aufg.status !== 'Erledigt') {
      termine.push({ datum: aufg.frist, typ: 'Aufgabe', beschreibung: aufg.aufgabe, standort: aufg.zustaendig || '', dl: daysLeft(aufg.frist) });
    }
  }

  termine.sort(function(a, b) {
    if (a.datum < b.datum) return -1;
    if (a.datum > b.datum) return 1;
    return 0;
  });
  return termine;
}

function vTerminkalender() {
  var filter = S.termineFilter || '90';
  var filterDefs = [
    { val: 'overdue', label: 'Überfällig' },
    { val: '30',  label: '30 Tage' },
    { val: '90',  label: '90 Tage' },
    { val: 'all', label: 'Alle' }
  ];
  var filterHtml = filterDefs.map(function(f) {
    return '<button class="filter-btn' + (filter === f.val ? ' filter-btn-active' : '') + '" data-action="termine-filter" data-filter="' + f.val + '">' + f.label + '</button>';
  }).join('');

  var typColors = {
    'Begehung':    { c: '#ed8b00', bg: '#FEF3E2' },
    'Unterweisung':{ c: '#2E86C1', bg: '#EBF5FB' },
    'Anlage':      { c: '#27AE60', bg: '#E8F8F0' },
    'Wartung':     { c: '#8E44AD', bg: '#F4ECF7' },
    'Aufgabe':     { c: '#717D7E', bg: '#F2F3F4' }
  };

  var alle = collectAllTermine();
  var liste = alle.filter(function(t) {
    if (filter === 'overdue') return t.dl < 0;
    if (filter === '30') return t.dl <= 30;
    if (filter === '90') return t.dl <= 90;
    return true;
  });

  var overdueCount = alle.filter(function(t) { return t.dl < 0; }).length;
  var soonCount = alle.filter(function(t) { return t.dl >= 0 && t.dl <= 30; }).length;

  var listHtml = '';
  if (liste.length === 0) {
    listHtml = '<div class="card empty-state">Keine Termine in diesem Zeitraum.</div>';
  } else {
    var lastMonth = '';
    for (var ti = 0; ti < liste.length; ti++) {
      var t = liste[ti];
      var tc = typColors[t.typ] || { c: '#717D7E', bg: '#F2F3F4' };
      var monthKey = t.datum ? t.datum.slice(0,7) : '';
      var monthLabel = '';
      if (monthKey && monthKey !== lastMonth) {
        var mp = monthKey.split('-');
        var mNames = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
        monthLabel = '<div class="section-header" style="padding-top:14px">' + mNames[parseInt(mp[1])-1] + ' ' + mp[0] + '</div>';
        lastMonth = monthKey;
      }
      var dlBadge = '';
      if (t.dl < 0) dlBadge = '<span class="badge badge-crit">Überfällig ' + Math.abs(t.dl) + ' d</span>';
      else if (t.dl === 0) dlBadge = '<span class="badge badge-crit">Heute fällig</span>';
      else if (t.dl <= 7) dlBadge = '<span class="badge badge-crit">in ' + t.dl + ' d</span>';
      else if (t.dl <= 30) dlBadge = '<span class="badge badge-warn">in ' + t.dl + ' d</span>';
      else dlBadge = '<span class="badge badge-ok">in ' + t.dl + ' d</span>';

      listHtml += monthLabel +
        '<div class="card" style="margin-bottom:6px;padding:10px 14px;display:flex;align-items:center;gap:10px">' +
        '<div style="width:6px;height:6px;border-radius:50%;background:' + tc.c + ';flex-shrink:0;margin-top:2px"></div>' +
        '<div style="flex:1;min-width:0">' +
        '<div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">' +
        '<span style="font-size:11px;font-weight:700;background:' + tc.bg + ';color:' + tc.c + ';border-radius:10px;padding:1px 7px">' + t.typ + '</span>' +
        (t.standort ? '<span style="font-size:11px;color:var(--text-light)">' + t.standort + '</span>' : '') +
        '</div>' +
        '<div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + t.beschreibung + '</div>' +
        '<div style="font-size:11px;color:var(--text-light);margin-top:1px">' + fmtDate(t.datum) + '</div>' +
        '</div>' +
        dlBadge +
        '</div>';
    }
  }

  return '<div class="header header-dark">' +
    '<button class="icon-btn" data-action="go-home"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>' +
    '<div class="header-center"><div class="header-title-sm">Terminkalender</div>' +
    '<div class="header-sub">' + overdueCount + ' überfällig &middot; ' + soonCount + ' in 30 Tagen</div></div>' +
    '</div>' +
    '<div style="padding:10px 12px 4px;display:flex;gap:6px;background:#fff;border-bottom:0.5px solid var(--border)">' + filterHtml + '</div>' +
    '<div class="content" style="padding-top:10px">' + listHtml +
    '<div style="padding-bottom:calc(24px + var(--safe-bottom))"></div></div>';
}

/* ── COMPLIANCE-MATRIX ── */

function vMatrix() {
  var cols = [
    { key: 'begehung',     label: 'Begehung' },
    { key: 'unterweisung', label: 'Unterweisung' },
    { key: 'anlagen',      label: 'Anlagen' },
    { key: 'maengel',      label: 'Mängel' }
  ];

  function cellHtml(status, text) {
    var bg = status === 'ok' ? '#D5F5E3' : status === 'warn' ? '#FEF9E7' : status === 'crit' ? '#FDEDEC' : '#F2F3F4';
    var color = status === 'ok' ? '#1E8449' : status === 'warn' ? '#D68910' : status === 'crit' ? '#C0392B' : '#808B96';
    return '<td style="padding:6px 8px;border-bottom:0.5px solid var(--border);text-align:center;background:' + bg + ';color:' + color + ';font-size:11px;font-weight:700;min-width:72px">' + text + '</td>';
  }

  var rows = '';
  for (var li = 0; li < LOCATIONS.length; li++) {
    var loc = LOCATIONS[li];

    // Begehung
    var lastInsp = lastInspForStandort(loc);
    var intv = S.intervalle[loc] ? parseInt(S.intervalle[loc]) : 0;
    var bCell, bStatus;
    if (!lastInsp) {
      bStatus = intv > 0 ? 'crit' : 'na';
      bCell = intv > 0 ? 'Keine' : '–';
    } else {
      var bDays = intv > 0 ? intv - daysBetween(lastInsp.datum, today()) : 999;
      if (bDays < 0) { bStatus = 'crit'; bCell = fmtDate(lastInsp.datum); }
      else if (bDays <= 14) { bStatus = 'warn'; bCell = fmtDate(lastInsp.datum); }
      else { bStatus = 'ok'; bCell = fmtDate(lastInsp.datum); }
    }

    // Unterweisung
    var lastUW = lastUWForStandort(loc);
    var uwDl = uwDaysLeft(lastUW);
    var uwStatus, uwCell;
    if (!lastUW) { uwStatus = 'crit'; uwCell = 'Keine'; }
    else if (uwDl < 0) { uwStatus = 'crit'; uwCell = fmtDate(lastUW.datum); }
    else if (uwDl <= 30) { uwStatus = 'warn'; uwCell = fmtDate(lastUW.datum); }
    else { uwStatus = 'ok'; uwCell = fmtDate(lastUW.datum); }

    // Anlagen
    var locAnlagen = S.anlagen.filter(function(a) { return a.standort === loc; });
    var anlStatus, anlCell;
    if (locAnlagen.length === 0) { anlStatus = 'na'; anlCell = '–'; }
    else {
      var critAn = locAnlagen.filter(function(a) { return a.letztePruefung && a.intervallMonate && anlageDaysLeft(a) < 0; });
      var warnAn = locAnlagen.filter(function(a) { return a.letztePruefung && a.intervallMonate && anlageDaysLeft(a) >= 0 && anlageDaysLeft(a) <= 30; });
      if (critAn.length > 0) { anlStatus = 'crit'; anlCell = critAn.length + ' überfällig'; }
      else if (warnAn.length > 0) { anlStatus = 'warn'; anlCell = warnAn.length + ' bald fällig'; }
      else { anlStatus = 'ok'; anlCell = locAnlagen.length + ' OK'; }
    }

    // Mängel
    var locMaengel = [];
    for (var ii = 0; ii < S.inspections.length; ii++) {
      if (S.inspections[ii].standort === loc) {
        var ms = (S.inspections[ii].maengel || []).filter(function(m) { return !m.behoben; });
        locMaengel = locMaengel.concat(ms);
      }
    }
    var krit = locMaengel.filter(function(m) { return m.dringlichkeit === 'kritisch'; });
    var mStatus, mCell;
    if (krit.length > 0) { mStatus = 'crit'; mCell = krit.length + ' kritisch'; }
    else if (locMaengel.length > 0) { mStatus = 'warn'; mCell = locMaengel.length + ' offen'; }
    else { mStatus = 'ok'; mCell = 'OK'; }

    rows += '<tr>' +
      '<td style="padding:6px 10px;border-bottom:0.5px solid var(--border);font-size:12px;font-weight:700;white-space:nowrap;background:#fff">' + loc + '</td>' +
      cellHtml(bStatus, bCell) +
      cellHtml(uwStatus, uwCell) +
      cellHtml(anlStatus, anlCell) +
      cellHtml(mStatus, mCell) +
      '</tr>';
  }

  var legend = [
    { bg: '#D5F5E3', color: '#1E8449', label: 'In Ordnung' },
    { bg: '#FEF9E7', color: '#D68910', label: 'Bald fällig' },
    { bg: '#FDEDEC', color: '#C0392B', label: 'Überfällig / kritisch' },
    { bg: '#F2F3F4', color: '#808B96', label: 'Kein Eintrag' }
  ].map(function(l) {
    return '<div style="display:flex;align-items:center;gap:6px">' +
      '<div style="width:14px;height:14px;border-radius:3px;background:' + l.bg + ';border:1px solid ' + l.color + ';flex-shrink:0"></div>' +
      '<span style="font-size:11px;color:var(--text-light)">' + l.label + '</span></div>';
  }).join('');

  return '<div class="header header-dark">' +
    '<button class="icon-btn" data-action="go-dashboard"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>' +
    '<div class="header-center"><div class="header-title-sm">Compliance-Matrix</div>' +
    '<div class="header-sub">Alle 10 Standorte auf einen Blick</div></div>' +
    '</div>' +
    '<div class="content">' +
    '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:12px;border:0.5px solid var(--border);margin-bottom:12px">' +
    '<table style="width:100%;border-collapse:collapse;background:#fff;min-width:440px">' +
    '<thead><tr>' +
    '<th style="padding:8px 10px;background:var(--dark);color:#fff;font-size:11px;text-align:left;min-width:90px">Standort</th>' +
    cols.map(function(c) { return '<th style="padding:8px 6px;background:var(--dark);color:#fff;font-size:11px;text-align:center;min-width:72px">' + c.label + '</th>'; }).join('') +
    '</tr></thead><tbody>' + rows + '</tbody></table></div>' +
    '<div style="display:flex;flex-wrap:wrap;gap:10px;padding:4px 0 8px">' + legend + '</div>' +
    '<div style="padding-bottom:calc(24px + var(--safe-bottom))"></div></div>';
}

/* ── AUFGABEN-MODUL ── */

function aufgabeStatusColor(status) {
  if (status === 'Erledigt') return { bg: 'var(--ok-bg)', color: 'var(--ok)', border: 'var(--ok-border)' };
  if (status === 'Dringend') return { bg: 'var(--crit-bg)', color: 'var(--crit)', border: 'var(--crit-border)' };
  if (status === 'In Bearbeitung') return { bg: 'var(--warn-bg)', color: 'var(--warn)', border: 'var(--warn-border)' };
  return { bg: 'var(--na-bg)', color: 'var(--na)', border: 'var(--border)' };
}

function vAufgaben() {
  var filter = S.aufgabenFilter || 'alle';
  var filterOpts = ['alle','Offen','In Bearbeitung','Dringend','Erledigt'];
  var filterHtml = filterOpts.map(function(f) {
    var active = filter === f;
    return '<button class="filter-btn' + (active ? ' filter-btn-active' : '') + '" data-action="aufgaben-filter" data-filter="' + f + '">' +
      (f === 'alle' ? 'Alle' : f) + '</button>';
  }).join('');

  var list = S.aufgaben.slice().sort(function(a, b) {
    var order = ['Dringend','In Bearbeitung','Offen','Erledigt'];
    var sa = order.indexOf(a.status), sb = order.indexOf(b.status);
    if (sa !== sb) return sa - sb;
    if (a.frist && b.frist) return a.frist < b.frist ? -1 : 1;
    return 0;
  });
  if (filter !== 'alle') list = list.filter(function(t) { return t.status === filter; });

  var offenCount = S.aufgaben.filter(function(t) { return t.status !== 'Erledigt'; }).length;

  var listHtml = '';
  if (list.length === 0) {
    listHtml = '<div class="card empty-state">Keine Aufgaben in dieser Kategorie.</div>';
  } else {
    for (var ti = 0; ti < list.length; ti++) {
      var t = list[ti];
      var sc = aufgabeStatusColor(t.status);
      var dl = t.frist ? daysLeft(t.frist) : 9999;
      var fristBadge = '';
      if (t.status !== 'Erledigt' && t.frist) {
        if (dl < 0) fristBadge = '<span class="badge badge-crit">Überfällig ' + Math.abs(dl) + ' d</span>';
        else if (dl <= 7) fristBadge = '<span class="badge badge-crit">Fällig in ' + dl + ' d</span>';
        else if (dl <= 14) fristBadge = '<span class="badge badge-warn">Fällig in ' + dl + ' d</span>';
      }
      listHtml += '<div class="card" style="margin-bottom:8px;padding:12px 14px;border-left:3px solid ' + sc.color + '">' +
        '<div style="display:flex;align-items:flex-start;gap:8px">' +
        '<div style="flex:1;min-width:0">' +
        '<div style="font-size:13px;font-weight:700;margin-bottom:3px">' + t.aufgabe + '</div>' +
        '<div style="font-size:12px;color:var(--text-light)">' +
        (t.zustaendig ? t.zustaendig : '') +
        (t.frist ? ' &middot; Frist: ' + fmtDate(t.frist) : '') +
        '</div>' +
        (t.bemerkung ? '<div style="font-size:12px;color:var(--text-light);margin-top:3px">' + t.bemerkung + '</div>' : '') +
        '</div>' +
        '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">' +
        '<span style="background:' + sc.bg + ';color:' + sc.color + ';border:1px solid ' + sc.border + ';border-radius:20px;padding:2px 9px;font-size:11px;font-weight:600;white-space:nowrap">' + t.status + '</span>' +
        fristBadge +
        '</div></div>' +
        '<div style="display:flex;gap:8px;margin-top:10px">' +
        AUFGABEN_STATUS.map(function(st) {
          var act = st === t.status;
          return '<button style="flex:1;background:' + (act ? aufgabeStatusColor(st).bg : '#fff') + ';color:' + aufgabeStatusColor(st).color + ';border:1px solid ' + aufgabeStatusColor(st).border + ';border-radius:8px;padding:5px 2px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit' + (act ? ';font-weight:700' : '') + '" data-action="aufgabe-status" data-agid="' + t.id + '" data-status="' + st + '">' + st + '</button>';
        }).join('') +
        '<button style="background:#fff;border:1px solid var(--border);border-radius:8px;padding:5px 8px;font-size:12px;cursor:pointer;color:var(--text-light)" data-action="aufgabe-edit" data-agid="' + t.id + '">&#9998;</button>' +
        '</div></div>';
    }
  }

  return '<div class="header header-dark">' +
    '<button class="icon-btn" data-action="go-home"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>' +
    '<div class="header-center"><div class="header-title-sm">Aufgaben</div>' +
    '<div class="header-sub">' + offenCount + ' offen</div></div>' +
    '<button class="icon-btn" data-action="csv-export-aufgaben" title="Als CSV exportieren">' +
    '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>' +
    '<button class="text-btn" data-action="aufgabe-neu">+ Neu</button>' +
    '</div>' +
    '<div style="padding:10px 12px 4px;display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;background:#fff;border-bottom:0.5px solid var(--border)">' + filterHtml + '</div>' +
    '<div class="content" style="padding-top:10px">' + listHtml +
    '<div style="padding-bottom:calc(24px + var(--safe-bottom))"></div></div>';
}

    '<textarea class="form-textarea" id="ag-bem">' + (t ? (t.bemerkung || '') : '') + '</textarea></div>' +

    '<div style="padding-bottom:calc(24px + var(--safe-bottom))"></div></div>';

/* ── TECHNIK-MODUL ── */

var ANLAGE_TYPEN = ['Feuerlöscher','BMA','BMZ','Notbeleuchtung','Brandschutztür','RWA','Sonstiges'];
var ANLAGE_INTERVALLE = [
  { val: '3',  label: '3 Monate' },
  { val: '6',  label: '6 Monate' },
  { val: '12', label: '1 Jahr' },
  { val: '24', label: '2 Jahre' },

  if (!anlage.letztePruefung || !anlage.intervallMonate) return 9999;
  return daysLeft(addMonths(anlage.letztePruefung, anlage.intervallMonate));
}

function statusBadgeForDays(d) {
  if (d < 0) return '<span class="badge badge-crit">Überfällig ' + Math.abs(d) + ' d</span>';
  if (d <= 14) return '<span class="badge badge-crit">Fällig in ' + d + ' d</span>';
  if (d <= 30) return '<span class="badge badge-warn">Fällig in ' + d + ' d</span>';
  return '<span class="badge badge-ok">Nächste: ' + fmtDate(addMonths(null, 0)) + '</span>';
}

function uwDaysLeft(uw) {
  if (!uw) return -9999;
  var next = new Date(uw.datum);
  next.setFullYear(next.getFullYear() + 1);
  return Math.round((next.getTime() - new Date().getTime()) / 86400000);
}

function addMonths(dateStr, months) {
  if (!dateStr || !months) return null;
  var d = new Date(dateStr);
  d.setMonth(d.getMonth() + parseInt(months));
  return d.toISOString().split('T')[0];
}

function daysLeft(targetDate) {
  if (!targetDate) return 9999;
  var t = new Date(targetDate).getTime();
  var n = new Date(today()).getTime();
  return Math.round((t - n) / 86400000);
}

/* ── CSV HELPERS ── */
function csvEsc(v) {
  var s = v === null || v === undefined ? '' : String(v);
  if (s.indexOf(',') !== -1 || s.indexOf('"') !== -1 || s.indexOf('\n') !== -1) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

function parseCSV(text) {
  var lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(function(l){ return l.trim(); });
  if (lines.length < 2) return [];
  function splitLine(line) {
    var cols = [], cur = '', inQ = false;
    for (var ci = 0; ci < line.length; ci++) {
      var ch = line[ci];
      if (ch === '"') {
        if (inQ && line[ci+1] === '"') { cur += '"'; ci++; }
        else inQ = !inQ;
      } else if (ch === ',' && !inQ) { cols.push(cur); cur = ''; }
      else cur += ch;
    }
    cols.push(cur);
    return cols;
  }
  var headers = splitLine(lines[0]).map(function(h){ return h.trim(); });
  var rows = [];
  for (var i = 1; i < lines.length; i++) {
    var cols = splitLine(lines[i]);
    var obj = {};
    for (var j = 0; j < headers.length; j++) { obj[headers[j]] = (cols[j] || '').trim(); }
    rows.push(obj);
  }
  return rows;
}

function downloadCSV(filename, content) {
  var blob = new Blob(['﻿' + content], { type: 'text/csv;charset=utf-8;' });
  if (navigator.share && navigator.canShare && navigator.canShare({ files: [new File([blob], filename, { type: 'text/csv' })] })) {
    navigator.share({ files: [new File([blob], filename, { type: 'text/csv' })] }).catch(function(){});
  } else {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    setTimeout(function(){ URL.revokeObjectURL(url); document.body.removeChild(a); }, 1000);
  }
}

/* ── XLSX IMPORT ── */
function importXLSX(file) {
  if (typeof XLSX === 'undefined') {
    alert('SheetJS nicht geladen. Bitte kurz online gehen und neu laden.');
    return;
  }
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var wb = XLSX.read(e.target.result, { type: 'array' });
      var total_added = 0, total_skipped = 0;
      var msgs = [];

      // Anlagen
      if (wb.SheetNames.indexOf('Anlagen') !== -1) {
        var rows = XLSX.utils.sheet_to_json(wb.Sheets['Anlagen']);
        var added = 0, skipped = 0;
        for (var i = 0; i < rows.length; i++) {
          var r = rows[i];
          var bez = r['Bezeichnung'] || r['bezeichnung'] || '';
          var standort = r['Standort'] || r['standort'] || S.technikStandort;
          if (!bez) { skipped++; continue; }
          var exists = false;
          for (var ei = 0; ei < S.anlagen.length; ei++) {
            if (S.anlagen[ei].bezeichnung === bez && S.anlagen[ei].standort === standort) { exists = true; break; }
          }
          if (exists) { skipped++; continue; }
          var typ = r['Typ'] || r['typ'] || 'Sonstiges';
          S.anlagen.push({ id: uid(), standort: standort,
            typ: ANLAGE_TYPEN.indexOf(typ) !== -1 ? typ : 'Sonstiges',
            bezeichnung: bez,
            letztePruefung: r['LetztePruefung'] || r['letztePruefung'] || '',
            intervallMonate: r['IntervallMonate'] || r['intervallMonate'] || '',
            pruefFirma: r['Prueffirma'] || r['pruefFirma'] || '',
            bemerkung: r['Bemerkung'] || r['bemerkung'] || '' });
          added++;
        }
        msgs.push('Anlagen: ' + added + ' importiert, ' + skipped + ' übersprungen');
        total_added += added; total_skipped += skipped;
      }

      // Verträge
      if (wb.SheetNames.indexOf('Vertraege') !== -1) {
        var vrows = XLSX.utils.sheet_to_json(wb.Sheets['Vertraege']);
        var vadd = 0, vskip = 0;
        for (var vi = 0; vi < vrows.length; vi++) {
          var vr = vrows[vi];
          var firma = vr['Firma'] || vr['firma'] || '';
          var vstandort = vr['Standort'] || vr['standort'] || S.technikStandort;
          if (!firma) { vskip++; continue; }
          var vexists = false;
          for (var vei = 0; vei < S.vertraege.length; vei++) {
            if (S.vertraege[vei].firma === firma && S.vertraege[vei].standort === vstandort) { vexists = true; break; }
          }
          if (vexists) { vskip++; continue; }
          S.vertraege.push({ id: uid(), standort: vstandort, firma: firma,
            leistung: vr['Leistung'] || vr['leistung'] || '',
            vertragsNummer: vr['Vertragsnummer'] || vr['vertragsNummer'] || '',
            naechsterTermin: vr['NaechsterTermin'] || vr['naechsterTermin'] || '',
            intervallMonate: vr['IntervallMonate'] || vr['intervallMonate'] || '',
            ansprechpartner: vr['Ansprechpartner'] || vr['ansprechpartner'] || '',
            telefon: vr['Telefon'] || vr['telefon'] || '',
            email: vr['Email'] || vr['email'] || '',
            bemerkung: vr['Bemerkung'] || vr['bemerkung'] || '' });
          vadd++;
        }
        msgs.push('Verträge: ' + vadd + ' importiert, ' + vskip + ' übersprungen');
        total_added += vadd; total_skipped += vskip;
      }

      // Kontakte
      if (wb.SheetNames.indexOf('Kontakte') !== -1) {
        var krows = XLSX.utils.sheet_to_json(wb.Sheets['Kontakte']);
        var kadd = 0, kskip = 0;
        for (var ki = 0; ki < krows.length; ki++) {
          var kr = krows[ki];
          var kname = kr['Name'] || kr['name'] || '';
          var kstandort = kr['Standort'] || kr['standort'] || S.technikStandort;
          if (!kname) { kskip++; continue; }
          var kexists = false;
          for (var kei = 0; kei < S.kontakte.length; kei++) {
            if (S.kontakte[kei].name === kname && S.kontakte[kei].standort === kstandort) { kexists = true; break; }
          }
          if (kexists) { kskip++; continue; }
          var krolle = kr['Rolle'] || kr['rolle'] || 'Sonstiges';
          S.kontakte.push({ id: uid(), standort: kstandort, name: kname,
            rolle: KONTAKT_ROLLEN.indexOf(krolle) !== -1 ? krolle : 'Sonstiges',
            telefon: kr['Telefon'] || kr['telefon'] || '',
            email: kr['Email'] || kr['email'] || '',
            bemerkung: kr['Bemerkung'] || kr['bemerkung'] || '' });
          kadd++;
        }
        msgs.push('Kontakte: ' + kadd + ' importiert, ' + kskip + ' übersprungen');
        total_added += kadd; total_skipped += kskip;
      }

      // Aufgaben
      if (wb.SheetNames.indexOf('Aufgaben') !== -1) {
        var arows = XLSX.utils.sheet_to_json(wb.Sheets['Aufgaben']);
        var aadd = 0, askip = 0;
        for (var ai = 0; ai < arows.length; ai++) {
          var ar = arows[ai];
          var aufg = ar['Aufgabe'] || ar['aufgabe'] || '';
          if (!aufg) { askip++; continue; }
          var aexists = false;
          for (var aei = 0; aei < S.aufgaben.length; aei++) {
            if (S.aufgaben[aei].aufgabe === aufg) { aexists = true; break; }
          }
          if (aexists) { askip++; continue; }
          var astatus = ar['Status'] || ar['status'] || 'Offen';
          S.aufgaben.push({ id: uid(),
            nr: ar['Nr'] || ar['nr'] || (S.aufgaben.length + 1),
            aufgabe: aufg,
            zustaendig: ar['Zustaendig'] || ar['zustaendig'] || '',
            frist: ar['Frist'] || ar['frist'] || '',
            status: ['Offen','In Arbeit','Erledigt'].indexOf(astatus) !== -1 ? astatus : 'Offen',
            bemerkung: ar['Bemerkung'] || ar['bemerkung'] || '' });
          aadd++;
        }
        msgs.push('Aufgaben: ' + aadd + ' importiert, ' + askip + ' übersprungen');
        total_added += aadd; total_skipped += askip;
      }

      save();
      alert('Excel-Import abgeschlossen:\n' + msgs.join('\n'));
      render();
    } catch(err) {
      alert('Fehler beim Lesen der Excel-Datei: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

/* ── UNTERWEISUNGEN ÜBERSICHT ── */
function vUnterweisungen() {
  var cardsHtml = '';
  for (var li = 0; li < LOCATIONS.length; li++) {
    var loc = LOCATIONS[li];
    var last = lastUWForStandort(loc);
    var days = uwDaysLeft(last);
    var badge = '';
    var cardClass = '';
    if (!last) {
      badge = '<span class="badge badge-crit">Noch keine Unterweisung</span>';
      cardClass = ' dash-card-overdue';
    } else if (days < 0) {
      badge = '<span class="badge badge-crit">Überfällig seit ' + Math.abs(days) + ' Tagen</span>';
      cardClass = ' dash-card-overdue';
    } else if (days <= 30) {
      badge = '<span class="badge badge-warn">Fällig in ' + days + ' Tagen</span>';
    } else {
      badge = '<span class="badge badge-ok">Aktuell</span>';
    }
    cardsHtml += '<div class="dash-card' + cardClass + '" data-action="uw-standort" data-loc="' + loc + '">' +
      '<div class="dash-name">' + loc + '</div>' +
      '<div class="dash-date">' + (last ? fmtDate(last.datum) + ' &middot; ' + (last.teilnehmer || []).length + ' Teilnehmer' : 'Keine Unterweisung') + '</div>' +
      '<div class="dash-badges" style="margin-top:6px">' + badge + '</div>' +
      '</div>';
  }
  return '<div class="header header-dark">' +
    '<button class="icon-btn" data-action="go-home" aria-label="Zurück"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>' +
    '<div class="header-center"><div class="header-title-sm">Brandschutzunterweisungen</div>' +
    '<div class="header-sub">DGUV V2 &middot; jährliche Pflicht</div></div>' +
    '</div>' +
    '<div class="content">' +
    '<div class="section-header">Standort antippen für Details oder neue Unterweisung</div>' +
    '<div class="dash-grid">' + cardsHtml + '</div>' +
    '</div>';
}

/* ── UNTERWEISUNG STANDORT ── */
function vUWStandort() {
  var loc = S.uwStandort;
  var ma = S.mitarbeiter[loc] || [];
  var uwList = S.unterweisungen.filter(function(u) { return u.standort === loc; }).slice().reverse();

  var maHtml = '';
  for (var mi = 0; mi < ma.length; mi++) {
    maHtml += '<div class="check-item-settings">' +
      '<div class="check-item-settings-text"><input type="text" class="item-name-input" value="' +
      ma[mi].name.replace(/"/g,'&quot;') + '" data-action="edit-ma" data-mid="' + ma[mi].id + '"></div>' +
      '<button class="icon-btn-sm icon-btn-red" data-action="del-ma" data-mid="' + ma[mi].id + '">&times;</button>' +
      '</div>';
  }

  var uwHtml = '';
  if (uwList.length === 0) {
    uwHtml = '<div class="empty-state">Noch keine Unterweisungen erfasst.</div>';
  } else {
    for (var ui = 0; ui < uwList.length; ui++) {
      var uw = uwList[ui];
      var days = uwDaysLeft(uw);
      var statusBadge = days < 0
        ? '<span class="badge badge-crit">Abgelaufen</span>'
        : days <= 30 ? '<span class="badge badge-warn">Läuft bald ab</span>'
