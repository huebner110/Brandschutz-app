        '<div class="inspection-item-left">' +
        '<div class="inspection-item-title">' + fmtDate(uw.datum) + '</div>' +
        '<div class="inspection-item-sub">' + (uw.teilnehmer || []).length + ' Teilnehmer &middot; ' + uw.unterweiser + '</div>' +
        '</div>' +
        '<div class="inspection-item-right">' + statusBadge +
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>' +
        '</div></div>';
    }
  }

  return '<div class="header header-dark">' +
    '<button class="icon-btn" data-action="go-unterweisungen" aria-label="Zurück"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>' +
    '<div class="header-center"><div class="header-title-sm">' + loc + '</div>' +
    '<div class="header-sub">Unterweisungen</div></div>' +
    '<button class="text-btn" data-action="uw-neu">+ Neu</button>' +
    '</div>' +
    '<div class="content">' +
    '<div class="section-header" style="display:flex;justify-content:space-between;align-items:center">' +
    '<span>Mitarbeiterliste</span>' +
    '<button class="btn-sm-outline" data-action="add-ma">+ Hinzufügen</button>' +
    '</div>' +
    '<div class="card" style="padding:8px 14px">' +
    (ma.length === 0 ? '<div class="empty-state" style="padding:16px">Noch keine Mitarbeiter erfasst.</div>' : maHtml) +
    '</div>' +
    '<div class="section-header">Durchgeführte Unterweisungen</div>' +
    uwHtml +
    '<div style="padding-bottom:calc(24px + var(--safe-bottom))"></div>' +
    '</div>';
}

/* ── NEUE UNTERWEISUNG ── */
function vUWNeu() {
  var loc = S.uwStandort;
  var ma = S.mitarbeiter[loc] || [];
  var uw = null;
  if (S.uwId) {
    for (var i = 0; i < S.unterweisungen.length; i++) {
      if (S.unterweisungen[i].id === S.uwId) { uw = S.unterweisungen[i]; break; }
    }
  }
  var datum = uw ? uw.datum : today();
  var unterweiser = uw ? uw.unterweiser : S.defaultBegeher;
  var selectedMa = uw ? (uw.teilnehmer || []).map(function(t) { return t.maId; }) : ma.map(function(m) { return m.id; });
  var selectedThemen = uw ? (uw.themen || []) : clone(UW_THEMEN_DEFAULT);

  var maChecks = '';
  for (var mi = 0; mi < ma.length; mi++) {
    var checked = selectedMa.indexOf(ma[mi].id) !== -1;
    maChecks += '<label style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--bg);cursor:pointer">' +
      '<input type="checkbox" class="uw-ma-cb" data-mid="' + ma[mi].id + '" data-mname="' + ma[mi].name.replace(/"/g,'&quot;') + '"' + (checked ? ' checked' : '') + ' style="width:18px;height:18px;accent-color:var(--primary);flex-shrink:0;">' +
      '<span style="font-size:14px">' + ma[mi].name + '</span>' +
      '</label>';
  }

  var themenChecks = '';
  for (var ti = 0; ti < UW_THEMEN_DEFAULT.length; ti++) {
    var tChecked = selectedThemen.indexOf(UW_THEMEN_DEFAULT[ti]) !== -1;
    themenChecks += '<label style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--bg);cursor:pointer">' +
      '<input type="checkbox" class="uw-th-cb" data-thema="' + UW_THEMEN_DEFAULT[ti].replace(/"/g,'&quot;') + '"' + (tChecked ? ' checked' : '') + ' style="width:18px;height:18px;accent-color:var(--primary);flex-shrink:0;">' +
      '<span style="font-size:13px;line-height:1.4">' + UW_THEMEN_DEFAULT[ti] + '</span>' +
      '</label>';
  }

  return '<div class="header header-dark">' +
    '<button class="icon-btn" data-action="uw-standort-back"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>' +
    '<div class="header-center"><div class="header-title-sm">Unterweisung ' + loc + '</div></div>' +
    '<button class="text-btn" data-action="save-uw">Speichern</button>' +
    '</div>' +
    '<div class="content">' +
    '<div class="card">' +
    '<div class="form-group"><label class="form-label">Datum</label>' +
    '<input type="date" class="form-input" id="uw-datum" value="' + datum + '"></div>' +
    '<div class="form-group"><label class="form-label">Unterweiser</label>' +
    '<input type="text" class="form-input" id="uw-unterweiser" value="' + unterweiser + '"></div>' +
    '</div>' +
    '<div class="section-header">Unterweisungsthemen</div>' +
    '<div class="card" style="padding:4px 14px">' + themenChecks + '</div>' +
    '<div class="section-header">Teilnehmer</div>' +
    (ma.length === 0
      ? '<div class="card empty-state">Bitte zuerst Mitarbeiter für ' + loc + ' anlegen.</div>'
      : '<div class="card" style="padding:4px 14px">' + maChecks + '</div>') +
    '<div style="padding:12px 0 calc(24px + var(--safe-bottom))">' +
    (uw ? '<button class="btn-danger" data-action="del-uw">Unterweisung löschen</button>' : '') +
    '</div></div>';
}

/* ── UNTERWEISUNG DETAIL / PDF ── */
function vUWDetail() {
  var uw = null;
  for (var i = 0; i < S.unterweisungen.length; i++) {
    if (S.unterweisungen[i].id === S.uwId) { uw = S.unterweisungen[i]; break; }
  }
  if (!uw) { nav('uw-standort'); return ''; }
  var days = uwDaysLeft(uw);
  var statusBadge = days < 0 ? '<span class="badge badge-crit">Abgelaufen</span>'
    : days <= 30 ? '<span class="badge badge-warn">Läuft in ' + days + ' Tagen ab</span>'
    : '<span class="badge badge-ok">Gültig noch ' + days + ' Tage</span>';
  var themenHtml = (uw.themen || []).map(function(t) {
    return '<li style="margin-bottom:4px">' + t + '</li>';
  }).join('');
  var tnHtml = (uw.teilnehmer || []).map(function(t) {
    return '<div style="padding:8px 0;border-bottom:0.5px solid var(--bg);font-size:14px">' + t.name + '</div>';
  }).join('');

  return '<div class="header header-dark">' +
    '<button class="icon-btn" data-action="go-uw-standort-from-detail"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>' +
    '<div class="header-center"><div class="header-title-sm">' + uw.standort + ' &middot; ' + fmtDate(uw.datum) + '</div></div>' +
    '<button class="text-btn" data-action="edit-uw">Bearbeiten</button>' +
    '</div>' +
    '<div class="content">' +
    '<div class="card">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">' +
    '<div style="font-size:15px;font-weight:600">' + fmtDate(uw.datum) + '</div>' + statusBadge + '</div>' +
    '<div style="font-size:13px;color:var(--text-light)">Unterweiser: ' + uw.unterweiser + '</div>' +
    '<div style="font-size:13px;color:var(--text-light)">' + (uw.teilnehmer || []).length + ' Teilnehmer</div>' +
    '</div>' +
    '<div class="section-header">Themen</div>' +
    '<div class="card"><ul style="padding-left:16px;font-size:13px;line-height:1.8">' + themenHtml + '</ul></div>' +
    '<div class="section-header">Teilnehmer</div>' +
    '<div class="card" style="padding:4px 14px">' + tnHtml + '</div>' +
    '<div style="display:flex;flex-direction:column;gap:10px;margin-top:8px;padding-bottom:calc(24px + var(--safe-bottom))">' +
    '<button class="btn-primary" data-action="export-uw">Unterweisungsnachweis exportieren (PDF)</button>' +
    '</div></div>';
}

/* ── MEHR-MENU TOGGLE ── */
document.addEventListener('click', function(e) {
  var menu = document.getElementById('mehr-menu');
  var btn = document.getElementById('mehr-btn');
  if (!menu) return;
  if (btn && (btn === e.target || btn.contains(e.target))) {
    e.stopPropagation();
    menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
    return;
  }
  menu.style.display = 'none';
}, true);

/* ── EVENT HANDLERS ── */
document.addEventListener('click', function(e) {
  var el = e.target.closest('[data-action]');
  if (!el) return;
  var a = el.dataset;

  if (a.action === 'go-settings') { nav('settings'); return; }
  if (a.action === 'go-home') { nav('home'); return; }
  if (a.action === 'go-hilfe') { nav('hilfe'); return; }
  if (a.action === 'go-dashboard') { nav('dashboard'); return; }
  if (a.action === 'go-maengel-global') { nav('maengel-global'); return; }
  if (a.action === 'go-qr') { nav('qr-codes'); return; }
  if (a.action === 'go-unterweisungen') { nav('unterweisungen'); return; }
  if (a.action === 'go-technik') { nav('technik'); return; }
  if (a.action === 'go-aufgaben') { nav('aufgaben'); return; }

  /* ── BACKUP ── */
  if (a.action === 'backup-export') { exportBackup(); return; }
  if (a.action === 'backup-import') { document.getElementById('backup-input').value=''; document.getElementById('backup-input').click(); return; }
  if (a.action === 'xlsx-export') { exportXLSX(); return; }
  if (a.action === 'xlsx-import') { document.getElementById('xlsx-input').value=''; document.getElementById('xlsx-input').click(); return; }
  if (a.action === 'export-csv-begehungen') { doCSV(); return; }

  /* ── CSV EXPORT ── */
  if (a.action === 'csv-export-anlagen')   { exportAnlagenCSV(); return; }
  if (a.action === 'csv-export-vertraege') { exportVertraegeCSV(); return; }
  if (a.action === 'csv-export-kontakte')  { exportKontakteCSV(); return; }
  if (a.action === 'csv-export-aufgaben')  { exportAufgabenCSV(); return; }

  /* ── CSV VORLAGEN ── */
  if (a.action === 'csv-template-anlagen')   { downloadCSV('Vorlage_Anlagen.csv', CSV_TEMPLATES.anlagen); return; }
  if (a.action === 'csv-template-vertraege') { downloadCSV('Vorlage_Vertraege.csv', CSV_TEMPLATES.vertraege); return; }
  if (a.action === 'csv-template-kontakte')  { downloadCSV('Vorlage_Kontakte.csv', CSV_TEMPLATES.kontakte); return; }

  /* ── CSV IMPORT ── */
  if (a.action === 'csv-import-anlagen')   { S.csvImportTarget = 'anlagen';   document.getElementById('csv-input').value=''; document.getElementById('csv-input').click(); return; }
  if (a.action === 'csv-import-vertraege') { S.csvImportTarget = 'vertraege'; document.getElementById('csv-input').value=''; document.getElementById('csv-input').click(); return; }
  if (a.action === 'csv-import-kontakte')  { S.csvImportTarget = 'kontakte';  document.getElementById('csv-input').value=''; document.getElementById('csv-input').click(); return; }
  if (a.action === 'go-termine') { nav('termine'); return; }
  if (a.action === 'go-matrix') { nav('matrix'); return; }
  if (a.action === 'termine-filter') { S.termineFilter = a.filter; render(); return; }

  /* ── AUFGABEN ── */
  if (a.action === 'aufgaben-filter') { S.aufgabenFilter = a.filter; render(); return; }
  if (a.action === 'aufgabe-neu') { S.editAufgabeId = null; nav('aufgabe-form'); return; }
  if (a.action === 'aufgabe-edit') { S.editAufgabeId = a.agid; nav('aufgabe-form'); return; }

  if (a.action === 'aufgabe-status') {
    for (var agi = 0; agi < S.aufgaben.length; agi++) {
      if (S.aufgaben[agi].id === a.agid) { S.aufgaben[agi].status = a.status; break; }
    }
    save(); render(); return;
  }

  if (a.action === 'save-aufgabe') {
    var agAufg = ((document.getElementById('ag-aufg') || {}).value || '').trim();
    var agZust = ((document.getElementById('ag-zust') || {}).value || '').trim();
    var agFrist = (document.getElementById('ag-frist') || {}).value || '';
    var agStatus = (document.getElementById('ag-status') || {}).value || 'Offen';
    var agBem = ((document.getElementById('ag-bem') || {}).value || '').trim();
    if (!agAufg) { alert('Bitte Aufgabe eingeben.'); return; }
    if (S.editAufgabeId) {
      for (var agei = 0; agei < S.aufgaben.length; agei++) {
        if (S.aufgaben[agei].id === S.editAufgabeId) {
          S.aufgaben[agei].aufgabe = agAufg; S.aufgaben[agei].zustaendig = agZust;
          S.aufgaben[agei].frist = agFrist; S.aufgaben[agei].status = agStatus;
          S.aufgaben[agei].bemerkung = agBem;
          break;
        }
      }
    } else {
      var maxNr = S.aufgaben.reduce(function(m, x) { return Math.max(m, x.nr || 0); }, 0);
      S.aufgaben.push({ id: uid(), nr: maxNr + 1, aufgabe: agAufg, zustaendig: agZust, frist: agFrist, status: agStatus, bemerkung: agBem });
    }
    save(); nav('aufgaben'); return;
  }

  if (a.action === 'del-aufgabe') {
    if (confirm('Aufgabe löschen?')) {
      S.aufgaben = S.aufgaben.filter(function(x) { return x.id !== S.editAufgabeId; });
      S.editAufgabeId = null; save(); nav('aufgaben');
    }
    return;
  }

  /* ── TECHNIK NAVIGATION ── */
  if (a.action === 'technik-anlage-neu') { S.editAnlageId = null; nav('technik-anlage'); return; }
  if (a.action === 'technik-anlage-edit') { S.editAnlageId = a.aid; nav('technik-anlage'); return; }
  if (a.action === 'technik-vertrag-neu') { S.editVertragId = null; nav('technik-vertrag'); return; }
  if (a.action === 'technik-vertrag-edit') { S.editVertragId = a.vid; nav('technik-vertrag'); return; }
  if (a.action === 'technik-kontakt-neu') { S.editKontaktId = null; nav('technik-kontakt'); return; }
  if (a.action === 'technik-kontakt-edit') { S.editKontaktId = a.kid; nav('technik-kontakt'); return; }

  /* ── ANLAGE SPEICHERN / LÖSCHEN ── */
  if (a.action === 'save-anlage') {
    var aTyp = (document.getElementById('a-typ') || {}).value || ANLAGE_TYPEN[0];
    var aBez = ((document.getElementById('a-bez') || {}).value || '').trim();
    var aDatum = (document.getElementById('a-datum') || {}).value || today();
    var aIntervall = (document.getElementById('a-intervall') || {}).value || '';
    var aFirma = ((document.getElementById('a-firma') || {}).value || '').trim();
    var aBem = ((document.getElementById('a-bem') || {}).value || '').trim();
    if (!aBez) { alert('Bitte eine Bezeichnung eingeben.'); return; }
    if (S.editAnlageId) {
      for (var aei = 0; aei < S.anlagen.length; aei++) {
        if (S.anlagen[aei].id === S.editAnlageId) {
          S.anlagen[aei].typ = aTyp; S.anlagen[aei].bezeichnung = aBez;
          S.anlagen[aei].letztePruefung = aDatum; S.anlagen[aei].intervallMonate = aIntervall;
          S.anlagen[aei].pruefFirma = aFirma; S.anlagen[aei].bemerkung = aBem;
          break;
        }
      }
    } else {
      S.anlagen.push({ id: uid(), standort: S.technikStandort, typ: aTyp, bezeichnung: aBez, letztePruefung: aDatum, intervallMonate: aIntervall, pruefFirma: aFirma, bemerkung: aBem });
    }
    save(); nav('technik'); return;
  }
  if (a.action === 'del-anlage') {
    if (confirm('Anlage löschen?')) {
      S.anlagen = S.anlagen.filter(function(x) { return x.id !== S.editAnlageId; });
      S.editAnlageId = null; save(); nav('technik');
    }
    return;
  }

  /* ── VERTRAG SPEICHERN / LÖSCHEN ── */
  if (a.action === 'save-vertrag') {
    var vFirma = ((document.getElementById('v-firma') || {}).value || '').trim();
    var vLeistung = ((document.getElementById('v-leistung') || {}).value || '').trim();
    var vVnum = ((document.getElementById('v-vnum') || {}).value || '').trim();
    var vTermin = (document.getElementById('v-termin') || {}).value || '';
    var vIntervall = (document.getElementById('v-intervall') || {}).value || '';
    var vAp = ((document.getElementById('v-ap') || {}).value || '').trim();
    var vTel = ((document.getElementById('v-tel') || {}).value || '').trim();
    var vEmail = ((document.getElementById('v-email') || {}).value || '').trim();
    var vBem = ((document.getElementById('v-bem') || {}).value || '').trim();
    if (!vFirma) { alert('Bitte Firma eingeben.'); return; }
    if (S.editVertragId) {
      for (var vei = 0; vei < S.vertraege.length; vei++) {
        if (S.vertraege[vei].id === S.editVertragId) {
          S.vertraege[vei].firma = vFirma; S.vertraege[vei].leistung = vLeistung;
          S.vertraege[vei].vertragsNummer = vVnum; S.vertraege[vei].naechsterTermin = vTermin;
          S.vertraege[vei].intervallMonate = vIntervall; S.vertraege[vei].ansprechpartner = vAp;
          S.vertraege[vei].telefon = vTel; S.vertraege[vei].email = vEmail; S.vertraege[vei].bemerkung = vBem;
          break;
        }
      }
    } else {
      S.vertraege.push({ id: uid(), standort: S.technikStandort, firma: vFirma, leistung: vLeistung, vertragsNummer: vVnum, naechsterTermin: vTermin, intervallMonate: vIntervall, ansprechpartner: vAp, telefon: vTel, email: vEmail, bemerkung: vBem });
    }
    save(); nav('technik'); return;
  }
  if (a.action === 'del-vertrag') {
    if (confirm('Wartungsvertrag löschen?')) {
      S.vertraege = S.vertraege.filter(function(x) { return x.id !== S.editVertragId; });
      S.editVertragId = null; save(); nav('technik');
    }
    return;
  }

  /* ── KONTAKT SPEICHERN / LÖSCHEN ── */
  if (a.action === 'save-kontakt') {
    var kName = ((document.getElementById('k-name') || {}).value || '').trim();
    var kRolle = (document.getElementById('k-rolle') || {}).value || KONTAKT_ROLLEN[0];
    var kTel = ((document.getElementById('k-tel') || {}).value || '').trim();
    var kEmail = ((document.getElementById('k-email') || {}).value || '').trim();
    var kBem = ((document.getElementById('k-bem') || {}).value || '').trim();
    if (!kName) { alert('Bitte Name eingeben.'); return; }
    if (S.editKontaktId) {
      for (var kei = 0; kei < S.kontakte.length; kei++) {
        if (S.kontakte[kei].id === S.editKontaktId) {
          S.kontakte[kei].name = kName; S.kontakte[kei].rolle = kRolle;
          S.kontakte[kei].telefon = kTel; S.kontakte[kei].email = kEmail; S.kontakte[kei].bemerkung = kBem;
          break;
        }
      }
    } else {
      S.kontakte.push({ id: uid(), standort: S.technikStandort, name: kName, rolle: kRolle, telefon: kTel, email: kEmail, bemerkung: kBem });
    }
    save(); nav('technik'); return;
  }
  if (a.action === 'del-kontakt') {
    if (confirm('Kontakt löschen?')) {
      S.kontakte = S.kontakte.filter(function(x) { return x.id !== S.editKontaktId; });
      S.editKontaktId = null; save(); nav('technik');
    }
    return;
  }

  if (a.action === 'uw-standort') { S.uwStandort = a.loc; nav('uw-standort'); return; }
  if (a.action === 'go-unterweisungen') { nav('unterweisungen'); return; }
  if (a.action === 'go-uw-standort-from-detail') { nav('uw-standort'); return; }
  if (a.action === 'uw-standort-back') { nav('uw-standort'); return; }

  if (a.action === 'uw-neu') { S.uwId = null; nav('uw-neu'); return; }

  if (a.action === 'add-ma') {
    var name = prompt('Name des Mitarbeiters:');
    if (name && name.trim()) {
      if (!S.mitarbeiter[S.uwStandort]) S.mitarbeiter[S.uwStandort] = [];
      S.mitarbeiter[S.uwStandort].push({ id: uid(), name: name.trim() });
      save(); render();
    }
    return;
  }

  if (a.action === 'del-ma') {
    if (confirm('Mitarbeiter entfernen?')) {
      if (S.mitarbeiter[S.uwStandort]) {
        S.mitarbeiter[S.uwStandort] = S.mitarbeiter[S.uwStandort].filter(function(m) { return m.id !== a.mid; });
        save(); render();
      }
    }
    return;
  }

  if (a.action === 'view-uw') { S.uwId = a.uid; nav('uw-detail'); return; }
  if (a.action === 'edit-uw') { nav('uw-neu'); return; }

  if (a.action === 'del-uw') {
    if (confirm('Unterweisung löschen?')) {
      S.unterweisungen = S.unterweisungen.filter(function(u) { return u.id !== S.uwId; });
      S.uwId = null; save(); nav('uw-standort');
    }
    return;
  }

  if (a.action === 'save-uw') {
    var datum = (document.getElementById('uw-datum') || {}).value || today();
    var unterweiser = (document.getElementById('uw-unterweiser') || {}).value || S.defaultBegeher;
    var maCbs = document.querySelectorAll('.uw-ma-cb:checked');
    var thCbs = document.querySelectorAll('.uw-th-cb:checked');
    var teilnehmer = [];
    for (var mci = 0; mci < maCbs.length; mci++) {
      teilnehmer.push({ maId: maCbs[mci].dataset.mid, name: maCbs[mci].dataset.mname });
    }
    var themen = [];
    for (var tci = 0; tci < thCbs.length; tci++) {
      themen.push(thCbs[tci].dataset.thema);
    }
    if (S.uwId) {
      for (var ui = 0; ui < S.unterweisungen.length; ui++) {
        if (S.unterweisungen[ui].id === S.uwId) {
          S.unterweisungen[ui].datum = datum;
          S.unterweisungen[ui].unterweiser = unterweiser;
          S.unterweisungen[ui].teilnehmer = teilnehmer;
          S.unterweisungen[ui].themen = themen;
          break;
        }
      }
    } else {
      var newUW = { id: uid(), standort: S.uwStandort, datum: datum, unterweiser: unterweiser, teilnehmer: teilnehmer, themen: themen };
      S.unterweisungen.push(newUW);
      S.uwId = newUW.id;
    }
    save(); nav('uw-detail'); return;
  }

  if (a.action === 'export-uw') { doExportUW(); return; }

  if (a.action === 'del-insp') {
    e.stopPropagation();
    if (S.adminPin) {
      var entered = prompt('Admin-PIN eingeben:');
      if (entered === null) return;
      if (entered !== S.adminPin) { alert('Falscher PIN. Begehung wurde nicht gelöscht.'); return; }
    } else {
      if (!confirm('Begehung löschen?')) return;
    }
    S.inspections = S.inspections.filter(function(i) { return i.id !== a.id; });
    save(); render();
    return;
  }

  if (a.action === 'dash-start') {
    S.lastStandort = a.loc;
    nav('home'); return;
  }

  if (a.action === 'mark-behoben') {
    for (var ii = 0; ii < S.inspections.length; ii++) {
      if (S.inspections[ii].id === a.inspid) {
        var maengel = S.inspections[ii].maengel || [];
        for (var mi = 0; mi < maengel.length; mi++) {
          if (maengel[mi].id === a.mid) {
            maengel[mi].behoben = true;
            maengel[mi].behobDatum = today();
            break;
          }
        }
        break;
      }
    }
    save(); render(); return;
  }

  if (a.action === 'start-inspection') {
    var standort = document.getElementById('h-standort').value;
    var datum = document.getElementById('h-datum').value;
    var beg = document.getElementById('h-begeher').value.trim() || S.defaultBegeher;
    var anwesende = (document.getElementById('h-anwesende') || {}).value || '';
    S.lastStandort = standort;
    S.currentInspection = { id: uid(), standort: standort, datum: datum, begeher: beg, anwesende: anwesende.trim(), checks: {}, maengel: [] };
    S.collapsedCats = {};
    save(); nav('inspection'); return;
  }

  if (a.action === 'view-insp') {
    for (var vi = 0; vi < S.inspections.length; vi++) {
      if (S.inspections[vi].id === a.id) { S.currentInspection = S.inspections[vi]; nav('summary'); break; }
    }
    return;
  }

  if (a.action === 'back-home') {
    if (confirm('Begehung unterbrechen? Bisherige Eingaben bleiben gespeichert.')) {
      saveInsp(); nav('home');
    }
    return;
  }

  if (a.action === 'toggle-cat') {
    S.collapsedCats[a.cat] = !S.collapsedCats[a.cat];
    render(); return;
  }

  if (a.action === 'check-ok') {
    if (!S.currentInspection.checks[a.iid]) S.currentInspection.checks[a.iid] = {};
    S.currentInspection.checks[a.iid].status = 'ok';
    S.currentInspection.maengel = (S.currentInspection.maengel || []).filter(function(m) { return m.checkId !== a.iid; });
    render(); return;
  }

  if (a.action === 'check-na') {
    if (!S.currentInspection.checks[a.iid]) S.currentInspection.checks[a.iid] = {};
    S.currentInspection.checks[a.iid].status = 'na';
    S.currentInspection.maengel = (S.currentInspection.maengel || []).filter(function(m) { return m.checkId !== a.iid; });
    render(); return;
  }

  if (a.action === 'check-notiz') {
    var existing = (S.currentInspection.checks[a.iid] || {}).notiz || '';
    var note = prompt('Bemerkung zu diesem Prüfpunkt:', existing);
    if (note !== null) {
      if (!S.currentInspection.checks[a.iid]) S.currentInspection.checks[a.iid] = { status: 'ok' };
      S.currentInspection.checks[a.iid].notiz = note.trim();
      render();
    }
    return;
  }

  if (a.action === 'check-photo') {
    S.currentPhotoTarget = { type: 'check', iid: a.iid };
    document.getElementById('photo-input').click(); return;
  }

  if (a.action === 'check-mangel') {
    var existingM = null;
    var maengelCM = S.currentInspection.maengel || [];
    for (var mi2 = 0; mi2 < maengelCM.length; mi2++) {
      if (maengelCM[mi2].checkId === a.iid) { existingM = maengelCM[mi2]; break; }
    }
    var mid = existingM ? existingM.id : uid();
    if (!S.currentInspection.checks[a.iid]) S.currentInspection.checks[a.iid] = {};
    S.currentInspection.checks[a.iid].status = 'mangel';
    if (!S.currentInspection.maengel) S.currentInspection.maengel = [];
    if (!existingM) S.currentInspection.maengel.push({ id: mid, checkId: a.iid, checkName: a.iname, beschreibung: '', dringlichkeit: 'mittel', zustaendig: '', frist: '', fotos: [], behoben: false });
    S.currentDefectId = mid;
    S.currentDefectCheckId = a.iid;
    S.currentDefectCheckName = a.iname;
    nav('defect'); return;
  }

  if (a.action === 'edit-defect') {
    var maengel2 = S.currentInspection.maengel || [];
    for (var mi3 = 0; mi3 < maengel2.length; mi3++) {
      if (maengel2[mi3].id === a.mid) {
        S.currentDefectId = a.mid; S.currentDefectCheckId = a.cid; S.currentDefectCheckName = maengel2[mi3].checkName;
        nav('defect'); break;
      }
    }
    return;
  }

  if (a.action === 'cancel-defect') {
    var maengelCa = S.currentInspection.maengel || [];
    for (var mca = 0; mca < maengelCa.length; mca++) {
      if (maengelCa[mca].id === S.currentDefectId && !maengelCa[mca].beschreibung) {
        S.currentInspection.maengel = S.currentInspection.maengel.filter(function(x) { return x.id !== S.currentDefectId; });
        delete S.currentInspection.checks[S.currentDefectCheckId];
        break;
      }
    }
    nav('inspection'); return;
  }

  if (a.action === 'save-defect') {
    var beschr = (document.getElementById('d-beschr') || {}).value || '';
    var zust = (document.getElementById('d-zust') || {}).value || '';
    var frist = (document.getElementById('d-frist') || {}).value || '';
    var maengelSv = S.currentInspection.maengel || [];
    var mSave = null;
    for (var msv = 0; msv < maengelSv.length; msv++) {
      if (maengelSv[msv].id === S.currentDefectId) { mSave = maengelSv[msv]; break; }
    }
    if (!mSave) {
      mSave = { id: S.currentDefectId, checkId: S.currentDefectCheckId, checkName: S.currentDefectCheckName, fotos: [], dringlichkeit: 'mittel', behoben: false };
      if (!S.currentInspection.maengel) S.currentInspection.maengel = [];
      S.currentInspection.maengel.push(mSave);
    }
    mSave.beschreibung = beschr; mSave.zustaendig = zust; mSave.frist = frist;
    var bedenkenCb = document.getElementById('d-bedenken');
    mSave.bedenken = bedenkenCb ? bedenkenCb.checked : false;
    if (!S.currentInspection.checks[S.currentDefectCheckId]) S.currentInspection.checks[S.currentDefectCheckId] = {};
    S.currentInspection.checks[S.currentDefectCheckId].status = 'mangel';
    nav('inspection'); return;
  }

  if (a.action === 'set-dring') {
    var maengelDr = S.currentInspection.maengel || [];
    var mDring = null;
    for (var mdr = 0; mdr < maengelDr.length; mdr++) {
      if (maengelDr[mdr].id === S.currentDefectId) { mDring = maengelDr[mdr]; break; }
    }
    if (!mDring) {
      mDring = { id: S.currentDefectId, checkId: S.currentDefectCheckId, checkName: S.currentDefectCheckName, fotos: [], beschreibung: '', zustaendig: '', frist: '', behoben: false };
      if (!S.currentInspection.maengel) S.currentInspection.maengel = [];
      S.currentInspection.maengel.push(mDring);
    }
    mDring.dringlichkeit = a.val;
    var btns = document.querySelectorAll('[data-action="set-dring"]');
    for (var b = 0; b < btns.length; b++) {
      var bv = btns[b].dataset.val;
      var ac = bv === a.val ? (' seg-active-' + (bv === 'gering' ? 'ok' : bv === 'mittel' ? 'warn' : 'crit')) : '';
      btns[b].className = 'seg-btn' + ac;
    }
    return;
  }

  if (a.action === 'del-photo') {
    var maengelPh = S.currentInspection.maengel || [];
    for (var mph = 0; mph < maengelPh.length; mph++) {
      if (maengelPh[mph].id === S.currentDefectId) {
        maengelPh[mph].fotos.splice(parseInt(a.idx), 1); render(); break;
      }
    }
    return;
  }

  if (a.action === 'add-photo-defect') {
    S.currentPhotoTarget = { type: 'defect' };
    document.getElementById('photo-input').click(); return;
  }

  if (a.action === 'del-defect') {
    if (confirm('Mangel entfernen?')) {
      S.currentInspection.maengel = (S.currentInspection.maengel || []).filter(function(x) { return x.id !== S.currentDefectId; });
      delete S.currentInspection.checks[S.currentDefectCheckId];
      nav('inspection');
    }
    return;
  }

  if (a.action === 'finish-insp') { saveInsp(); nav('summary'); return; }
  if (a.action === 'export') { doExport(); return; }
  if (a.action === 'do-csv') { doCSV(); return; }

  if (a.action === 'go-unterschrift') { nav('unterschrift'); return; }
  if (a.action === 'cancel-unterschrift') { nav('summary'); return; }
  if (a.action === 'save-unterschrift') {
    var canvas = document.getElementById('sig-canvas');
    if (canvas) { S.currentInspection.unterschrift = canvas.toDataURL('image/png'); saveInsp(); }
    nav('summary'); return;
  }

  if (a.action === 'save-settings') {
    var bv2 = (document.getElementById('s-begeher') || {}).value;
    if (bv2 && bv2.trim()) S.defaultBegeher = bv2.trim();
    var ev = (document.getElementById('s-email') || {}).value;
    S.defaultEmail = ev ? ev.trim() : '';
    var fv = (document.getElementById('s-firmierung') || {}).value;
    if (fv && fv.trim()) S.firmierung = fv.trim();
    var pv = (document.getElementById('s-pin') || {}).value;
    S.adminPin = pv !== undefined ? pv : S.adminPin;
    save(); nav('home'); return;
  }

  if (a.action === 'add-cat') {
    var nc = { id: uid(), name: 'Neue Kategorie', items: [] };
    S.categories.push(nc); S.editCategoryId = nc.id; save();
    nav('settings-cat'); return;
  }

  if (a.action === 'edit-cat') { S.editCategoryId = a.cid; nav('settings-cat'); return; }

  if (a.action === 'save-cat') {
    for (var cs = 0; cs < S.categories.length; cs++) {
      if (S.categories[cs].id === S.editCategoryId) {
        var ni = (document.getElementById('cat-name') || {}).value;
        if (ni && ni.trim()) S.categories[cs].name = ni.trim();
        break;
      }
    }
    save(); nav('settings'); return;
  }

  if (a.action === 'del-cat') {
    if (confirm('Kategorie und alle Prüfpunkte löschen?')) {
      S.categories = S.categories.filter(function(c) { return c.id !== a.cid; });
      save(); nav('settings');
    }
    return;
  }

  if (a.action === 'add-item') {
    for (var ca = 0; ca < S.categories.length; ca++) {
      if (S.categories[ca].id === a.cid) {
        S.categories[ca].items.push({ id: uid(), name: 'Neuer Prüfpunkt' }); save(); render(); break;
      }
    }
    return;
  }

  if (a.action === 'del-item') {
    for (var cd = 0; cd < S.categories.length; cd++) {
      if (S.categories[cd].id === a.cid) {
        S.categories[cd].items = S.categories[cd].items.filter(function(i) { return i.id !== a.iid; }); save(); render(); break;
      }
    }
    return;
  }

  if (a.action === 'item-up') {
    for (var cu = 0; cu < S.categories.length; cu++) {
      if (S.categories[cu].id === a.cid) {
        var idxU = -1;
        for (var u = 0; u < S.categories[cu].items.length; u++) { if (S.categories[cu].items[u].id === a.iid) { idxU = u; break; } }
        if (idxU > 0) { var tmpU = S.categories[cu].items[idxU]; S.categories[cu].items[idxU] = S.categories[cu].items[idxU-1]; S.categories[cu].items[idxU-1] = tmpU; save(); render(); }
        break;
      }
    }
    return;
  }

  if (a.action === 'item-down') {
    for (var dn = 0; dn < S.categories.length; dn++) {
      if (S.categories[dn].id === a.cid) {
        var idxD = -1;
        for (var d = 0; d < S.categories[dn].items.length; d++) { if (S.categories[dn].items[d].id === a.iid) { idxD = d; break; } }
        if (idxD < S.categories[dn].items.length - 1) { var tmpD = S.categories[dn].items[idxD]; S.categories[dn].items[idxD] = S.categories[dn].items[idxD+1]; S.categories[dn].items[idxD+1] = tmpD; save(); render(); }
        break;
      }
    }
    return;
  }

  if (a.action === 'reset-all') {
    if (confirm('Alle gespeicherten Daten und Einstellungen löschen?')) {
      localStorage.removeItem('bs2_cats'); localStorage.removeItem('bs2_insps');
      localStorage.removeItem('bs2_begeher'); localStorage.removeItem('bs2_standort');
      localStorage.removeItem('bs2_email'); localStorage.removeItem('bs2_intervalle');
      load(); nav('home');
    }
    return;
  }
});

document.getElementById('photo-input').addEventListener('change', function(e) {
  var files = Array.from(e.target.files);
  if (!files.length) return;
  var target = S.currentPhotoTarget || { type: 'defect' };
  var results = [];
  var done = 0;
  for (var fi = 0; fi < files.length; fi++) {
    (function(file) {
      var img = new Image();
      var reader = new FileReader();
      reader.onload = function(ev) {
        img.onload = function() {
          var canvas = document.createElement('canvas');
          var MAX = 1200;
          var w = img.width, h = img.height;
          if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          results.push(canvas.toDataURL('image/jpeg', 0.75));
          done++;
          if (done === files.length) {
            if (target.type === 'defect') {
              var maengel = S.currentInspection.maengel || [];
              for (var mi = 0; mi < maengel.length; mi++) {
                if (maengel[mi].id === S.currentDefectId) { maengel[mi].fotos = (maengel[mi].fotos || []).concat(results); break; }
              }
            } else if (target.type === 'check') {
              var iid = target.iid;
              if (!S.currentInspection.checks[iid]) S.currentInspection.checks[iid] = { status: 'ok' };
              S.currentInspection.checks[iid].fotos = (S.currentInspection.checks[iid].fotos || []).concat(results);
            }
            S.currentPhotoTarget = null;
            render();
            e.target.value = '';
          }
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    })(files[fi]);
  }
});

/* ── BEGEHUNGEN CSV EXPORT ── */
function doCSV() {
  var rows = ['Standort;Datum;Begeher;Anwesende;Prüfpunkt;Kategorie;Status;Mangel-Beschreibung;Dringlichkeit;Zuständig;Frist;Behoben'];
  for (var ii = 0; ii < S.inspections.length; ii++) {
    var insp = S.inspections[ii];
    var checks = insp.checks || {};
    for (var ci = 0; ci < S.categories.length; ci++) {
      var cat = S.categories[ci];
      for (var ki = 0; ki < cat.items.length; ki++) {
        var item = cat.items[ki];
        var ch = checks[item.id] || {};
        var m = null;
        var maengel = insp.maengel || [];
        for (var mi = 0; mi < maengel.length; mi++) {
          if (maengel[mi].checkId === item.id) { m = maengel[mi]; break; }
        }
        var status = ch.status === 'ok' ? 'OK' : ch.status === 'mangel' ? 'Mangel' : ch.status === 'na' ? 'N.A.' : '';
        rows.push([
          insp.standort, fmtDate(insp.datum), insp.begeher, insp.anwesende || '',
          item.name, cat.name, status,
          m ? (m.beschreibung || '') : '',
          m ? (m.dringlichkeit || '') : '',
          m ? (m.zustaendig || '') : '',
          m ? (m.frist ? fmtDate(m.frist) : '') : '',
          m ? (m.behoben ? 'Ja' : 'Nein') : ''
        ].map(function(v) { return '"' + String(v).replace(/"/g,'""') + '"'; }).join(';'));
      }
    }
  }
  var csv = rows.join('\n');
  var blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var fname = 'Begehungen_' + today() + '.csv';
  if (navigator.share && navigator.canShare && navigator.canShare({ files: [new File([blob], fname, { type: 'text/csv' })] })) {
    navigator.share({ files: [new File([blob], fname, { type: 'text/csv' })], title: fname });
  } else {
    var a = document.createElement('a');
    a.href = url; a.download = fname;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }
}

/* ── PDF EXPORT ── */
function doExport() {
  var insp = S.currentInspection;
  var c = inspCounts(insp);
  var checks = insp.checks || {};
  var maengel = (insp.maengel || []).slice().sort(function(a, b) {
    var order = ['kritisch','mittel','gering'];
    return order.indexOf(a.dringlichkeit) - order.indexOf(b.dringlichkeit);
  });

  var tableRows = '';
  for (var ci = 0; ci < S.categories.length; ci++) {
    var cat = S.categories[ci];
    var rows = '';
    for (var ii = 0; ii < cat.items.length; ii++) {
      var item = cat.items[ii];
      var ch = checks[item.id] || {};
      var m = null;
      for (var mi = 0; mi < maengel.length; mi++) {
        if (maengel[mi].checkId === item.id) { m = maengel[mi]; break; }
      }
      if (!ch.status) {
        rows += '<tr><td>' + item.name + '</td><td class="s-na">–</td><td></td></tr>';
      } else {
        var st = ch.status === 'ok' ? 'In Ordnung' : ch.status === 'mangel' ? 'Mangel' : 'N.A.';
        var sc = ch.status === 'ok' ? 's-ok' : ch.status === 'mangel' ? 's-mn' : 's-na';
        var bemerkung = ch.notiz || (m ? (m.beschreibung || '') : '');
        var checkFotosHtml = '';
        if (ch.fotos && ch.fotos.length) {
          checkFotosHtml = '<div class="photos">';
          for (var cfp = 0; cfp < ch.fotos.length; cfp++) {
            checkFotosHtml += '<img src="' + ch.fotos[cfp] + '">';
          }
          checkFotosHtml += '</div>';
        }
        rows += '<tr><td>' + item.name + '</td><td class="' + sc + '">' + st + '</td><td>' + bemerkung + checkFotosHtml + '</td></tr>';
      }
    }
    tableRows += '<table><thead><tr><th style="width:58%">' + cat.name + '</th><th style="width:13%">Status</th><th>Bemerkung</th></tr></thead><tbody>' + rows + '</tbody></table>';
  }

  var maengelSection = '';
  if (maengel.length > 0) {
    maengelSection = '<h2>Mängelliste</h2>';
    for (var mi2 = 0; mi2 < maengel.length; mi2++) {
      var mg = maengel[mi2];
      var mgCat = null;
      for (var ci2 = 0; ci2 < S.categories.length; ci2++) {
        for (var ii2 = 0; ii2 < S.categories[ci2].items.length; ii2++) {
          if (S.categories[ci2].items[ii2].id === mg.checkId) { mgCat = S.categories[ci2]; break; }
        }
        if (mgCat) break;
      }
      var dc = mg.dringlichkeit === 'gering' ? 'dg' : mg.dringlichkeit === 'mittel' ? 'dm' : 'dc';
      var fotosEx = '';
      if (mg.fotos && mg.fotos.length) {
        fotosEx = '<div class="photos">';
        for (var fp = 0; fp < mg.fotos.length; fp++) { fotosEx += '<img src="' + mg.fotos[fp] + '">'; }
        fotosEx += '</div>';
      }
      var dringCap = mg.dringlichkeit.charAt(0).toUpperCase() + mg.dringlichkeit.slice(1);
      var behobHtml = mg.behoben ? '<span class="db" style="background:#F2F3F4;color:#808B96">Behoben ' + (mg.behobDatum ? fmtDate(mg.behobDatum) : '') + '</span>' : '';
      maengelSection += '<div class="mb">' +
        '<div class="mb-h"><strong>' + (mi2+1) + '. ' + mg.checkName + '</strong>' +
        '<div style="display:flex;gap:4px"><span class="db ' + dc + '">' + dringCap + '</span>' + behobHtml + '</div></div>' +
        '<div class="mb-b">' +
        (mgCat ? '<div style="font-size:7.5pt;color:#717D7E;margin-bottom:3px">Kategorie: ' + mgCat.name + '</div>' : '') +
        '<div>' + (mg.beschreibung || '') + '</div>' +
        (mg.zustaendig ? '<div style="margin-top:3px;font-size:8pt">Zuständig: ' + mg.zustaendig + '</div>' : '') +
        (mg.frist ? '<div style="font-size:8pt">Frist: ' + fmtDate(mg.frist) + '</div>' : '') +
        fotosEx + '</div></div>';
    }
  }

  var sigSection = '';
  if (insp.unterschrift) {
    sigSection = '<div class="sig"><div class="sig-box"><img src="' + insp.unterschrift + '" style="height:60px;display:block;margin-bottom:4px"><div class="sig-line"></div><div class="sig-lbl">' + insp.begeher + ' &middot; ' + fmtDate(insp.datum) + '</div></div></div>';
  } else {

/* ── URL PARAM INIT ── */
function getUrlParam(name) {
  try {
    var search = window.location.search;
    var idx = search.indexOf(name + '=');
    if (idx === -1) return null;
    var val = search.slice(idx + name.length + 1);
    var end = val.indexOf('&');
    if (end !== -1) val = val.slice(0, end);
    return decodeURIComponent(val.replace(/\+/g, ' '));
  } catch(e) { return null; }
}

  render();
});
